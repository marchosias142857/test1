<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>图片展示</title>

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="图片展示">
<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="image3.png">
<link rel="icon" href="image3.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    overflow-x: hidden;
}

.top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999;
    padding-top: env(safe-area-inset-top);
    background: #fff;
}

.top img,
.bottom-image {
    display: block;
    width: 100%;
    height: auto;
    -webkit-user-drag: none;
    user-select: none;
}

.bottom-image {
    position: relative;
    z-index: 1000;
    margin-top: calc(var(--top-height, 0px) + env(safe-area-inset-top));
}
</style>
</head>

<body>

<div class="top" id="topArea">
    <img src="image1.jpg" alt="">
</div>

<img class="bottom-image" src="image2.jpg" alt="">

<script>
function updateTopHeight() {
    const topArea = document.getElementById("topArea");
    document.documentElement.style.setProperty(
        "--top-height",
        topArea.offsetHeight + "px"
    );
}

window.addEventListener("load", updateTopHeight);
window.addEventListener("resize", updateTopHeight);

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
